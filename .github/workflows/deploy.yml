name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to all ASG instances
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' '${{ secrets.EC2_SSH_KEY }}' > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          ssh-keygen -l -f ~/.ssh/deploy_key.pem

      - name: Add bastion to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.BASTION_IP }} >> ~/.ssh/known_hosts

      - name: Get live instance IPs from ASG
        id: get-ips
        run: |
          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names ${{ secrets.ASG_NAME }} \
            --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId' \
            --output text)

          PRIVATE_IPS=$(aws ec2 describe-instances \
            --instance-ids $INSTANCE_IDS \
            --query 'Reservations[].Instances[].PrivateIpAddress' \
            --output text)

          echo "ips=$PRIVATE_IPS" >> $GITHUB_OUTPUT
          echo "Found instances: $PRIVATE_IPS"

      - name: Deploy to each instance
        run: |
          for IP in ${{ steps.get-ips.outputs.ips }}; do
            echo "Deploying to $IP..."

            ssh -i ~/.ssh/deploy_key.pem \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=10 \
              -o ProxyCommand="ssh -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no -W %h:%p ubuntu@${{ secrets.BASTION_IP }}" \
              ubuntu@$IP "
                # Load nvm/node into PATH for non-interactive SSH sessions
                export NVM_DIR=\"\$HOME/.nvm\"
                [ -s \"\$NVM_DIR/nvm.sh\" ] && source \"\$NVM_DIR/nvm.sh\"
                export PATH=\"\$PATH:/usr/local/bin:/usr/bin\"

                echo \"Node: \$(node -v)\"
                echo \"npm: \$(npm -v)\"
                echo \"pm2: \$(pm2 -v)\"

                # Clone if no git repo, otherwise pull
                if [ -d /home/ubuntu/Donationapp-Backend/.git ]; then
                  echo 'Pulling latest code...'
                  cd /home/ubuntu/Donationapp-Backend && git pull origin main
                else
                  echo 'Cloning repo...'
                  rm -rf /home/ubuntu/Donationapp-Backend
                  git clone https://github.com/Greham-Solanki/Donationapp-Backend.git /home/ubuntu/Donationapp-Backend
                fi

                cd /home/ubuntu/Donationapp-Backend

                # Write .env AFTER clone/pull so it is never wiped
                printf 'PORT=${{ secrets.PORT }}\nNODE_ENV=${{ secrets.NODE_ENV }}\nMONGODB_URI=${{ secrets.MONGODB_URI }}\nJWT_SECRET=${{ secrets.JWT_SECRET }}\nAWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}\nAWS_REGION=${{ secrets.AWS_REGION }}\nS3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}\n' > .env
                echo '.env written'

                npm install --omit=dev

                if pm2 list | grep -q backend; then
                  pm2 restart backend
                else
                  pm2 start server.js --name backend
                fi

                pm2 logs backend --lines 10 --nostream
              "

            echo "✅ Done with $IP"
          done

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key.pem