name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to all ASG instances
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' '${{ secrets.EC2_SSH_KEY }}' > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          ssh-keygen -l -f ~/.ssh/deploy_key.pem

      - name: Deploy to ASG via SSM
        run: |
          # 1. Get all InService Instance IDs from the ASG
          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names ${{ secrets.ASG_NAME }} \
            --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId' \
            --output text)

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No InService instances found in ASG!"
            exit 1
          fi

          echo "Deploying to instances: $INSTANCE_IDS"

          # 2. Send the deployment commands via SSM
          # Note: We use a multi-line string for the commands
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids $INSTANCE_IDS \
            --comment "Deploying Backend Update" \
            --parameters 'commands=[
              "export NVM_DIR=\"$HOME/.nvm\"",
              "[ -s \"$NVM_DIR/nvm.sh\" ] && . \"$NVM_DIR/nvm.sh\"",
              "cd /home/ubuntu/Donationapp-Backend",
              "git fetch --all",
              "git reset --hard origin/main",
              "printf \"PORT=${{ secrets.PORT }}\nNODE_ENV=${{ secrets.NODE_ENV }}\nMONGODB_URI=${{ secrets.MONGODB_URI }}\nJWT_SECRET=${{ secrets.JWT_SECRET }}\" > .env",
              "npm install --omit=dev",
              "pm2 restart backend || pm2 start server.js --name backend",
              "pm2 save"
            ]' \
            --region ${{ secrets.AWS_REGION }}

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key.pem